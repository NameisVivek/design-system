<!doctype html><html><head><meta charset="utf-8"><title>Buttons — Outline & Ghost</title>
<link rel="stylesheet" href="card.css">
<style>
  .btn { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:4px; border:1px solid; font:var(--s-text-md-strong); cursor:pointer; line-height:20px; }
  .outline { background:#fff; border-color:#bfbeb9; color:#383836; box-shadow:0px 1px 1px 0px rgba(27,27,26,0.06), inset 0px -1px 1px 1px #efeeeb; }
  .outline-primary { background:#fff; border-color:rgba(0,38,229,0.5); color:#371ee1; }
  .outline-critical { background:#fff; border-color:rgba(213,0,71,0.5); color:#d50047; }
  .ghost { background:transparent; border-color:transparent; color:#383836; }
  .ghost-primary { background:transparent; border-color:transparent; color:#371ee1; }
  .tonal { background:rgba(55,30,225,0.06); border-color:transparent; color:#371ee1; }
</style></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px">Outline · Ghost · Tonal</div>
  <div class="row">
    <button class="btn outline">Cancel</button>
    <button class="btn outline-primary">Action</button>
    <button class="btn outline-critical">Delete</button>
  </div>
  <div class="row" style="margin-top:10px">
    <button class="btn ghost">Ghost</button>
    <button class="btn ghost-primary">Ghost · primary</button>
    <button class="btn tonal">Tonal · primary</button>
  </div>
</div>
</body></html>
