<!doctype html><html><head><meta charset="utf-8"><title>Type — Title & Text</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px">Title &amp; body scale</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-title-lg-default);color:#1b1b1a">Title large 20/28</span><span class="mono">title-lg · 600</span></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-title-md-default);color:#1b1b1a">Title medium 16/24</span><span class="mono">title-md · 600</span></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-title-sm-default);color:#1b1b1a">Title small 13/20</span><span class="mono">title-sm · 600</span></div>
    <div style="height:1px;background:rgba(56,56,54,0.12);margin:6px 0"></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-text-md-default)">Body 13/20 — the quick brown fox.</span><span class="mono">text-md</span></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-text-md-strong)">Body strong 13/20.</span><span class="mono">text-md-strong</span></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-text-sm-default);color:#5c5b57">Small 12/16 — helpers &amp; captions.</span><span class="mono">text-sm</span></div>
    <div style="display:flex;align-items:baseline;gap:16px"><span style="font:var(--s-text-xs-strong);text-transform:uppercase;letter-spacing:0.04em;color:#5c5b57">XS Strong 10/10 · labels</span><span class="mono">text-xs-strong</span></div>
  </div>
</div>
</body></html>
