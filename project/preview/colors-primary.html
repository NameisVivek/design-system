<!doctype html><html><head><meta charset="utf-8"><title>Colors — Primary</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px">Primary · Indigo</div>
  <div class="row">
    <div class="col">
      <div class="swatch" style="width:96px;height:64px;background:#371ee1"></div>
      <div class="stack-tight"><strong style="font:var(--s-text-sm-strong)">Default</strong><span class="mono">#371ee1</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="width:96px;height:64px;background:#221098"></div>
      <div class="stack-tight"><strong style="font:var(--s-text-sm-strong)">Hover</strong><span class="mono">#221098</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="width:96px;height:64px;background:#110662"></div>
      <div class="stack-tight"><strong style="font:var(--s-text-sm-strong)">Active</strong><span class="mono">#110662</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="width:96px;height:64px;background:#dae2fe"></div>
      <div class="stack-tight"><strong style="font:var(--s-text-sm-strong)">Weak</strong><span class="mono">#dae2fe</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="width:96px;height:64px;background:#f6f8ff"></div>
      <div class="stack-tight"><strong style="font:var(--s-text-sm-strong)">Weak bg</strong><span class="mono">#f6f8ff</span></div>
    </div>
  </div>
</div>
</body></html>
