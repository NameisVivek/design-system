<!doctype html><html><head><meta charset="utf-8"><title>Colors — Semantic</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px">Semantic · Sentiments</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    <div class="col">
      <div style="display:flex;gap:0;height:56px;border-radius:var(--s-radius-s);overflow:hidden">
        <div style="flex:1;background:#00795d"></div><div style="flex:1;background:#00513e"></div><div style="flex:1;background:#00382b"></div>
      </div>
      <div style="display:flex;gap:0;height:20px;border-radius:var(--s-radius-s);overflow:hidden;border:1px solid #e8e7e3">
        <div style="flex:1;background:#f2f9f8"></div><div style="flex:1;background:#e6f4f0"></div><div style="flex:1;background:#cce8e2"></div>
      </div>
      <strong style="font:var(--s-text-sm-strong);color:#00795d">Success</strong>
      <span class="mono">#00795d</span>
    </div>
    <div class="col">
      <div style="display:flex;gap:0;height:56px;border-radius:var(--s-radius-s);overflow:hidden">
        <div style="flex:1;background:#d50047"></div><div style="flex:1;background:#910031"></div><div style="flex:1;background:#670022"></div>
      </div>
      <div style="display:flex;gap:0;height:20px;border-radius:var(--s-radius-s);overflow:hidden;border:1px solid #e8e7e3">
        <div style="flex:1;background:#fef6f9"></div><div style="flex:1;background:#fdedf2"></div><div style="flex:1;background:#fbdae5"></div>
      </div>
      <strong style="font:var(--s-text-sm-strong);color:#d50047">Error</strong>
      <span class="mono">#d50047</span>
    </div>
    <div class="col">
      <div style="display:flex;gap:0;height:56px;border-radius:var(--s-radius-s);overflow:hidden">
        <div style="flex:1;background:#ece68c"></div><div style="flex:1;background:#c4bc45"></div><div style="flex:1;background:#716d28"></div>
      </div>
      <div style="display:flex;gap:0;height:20px;border-radius:var(--s-radius-s);overflow:hidden;border:1px solid #e8e7e3">
        <div style="flex:1;background:#faf9e3"></div><div style="flex:1;background:#f6f3c7"></div><div style="flex:1;background:#ece68c"></div>
      </div>
      <strong style="font:var(--s-text-sm-strong);color:#716d28">Warning</strong>
      <span class="mono">#ece68c · txt #716d28</span>
    </div>
    <div class="col">
      <div style="display:flex;gap:0;height:56px;border-radius:var(--s-radius-s);overflow:hidden">
        <div style="flex:1;background:#8351c2"></div><div style="flex:1;background:#583583"></div><div style="flex:1;background:#3c245a"></div>
      </div>
      <div style="display:flex;gap:0;height:20px;border-radius:var(--s-radius-s);overflow:hidden;border:1px solid #e8e7e3">
        <div style="flex:1;background:#f9f7fc"></div><div style="flex:1;background:#f3eff9"></div><div style="flex:1;background:#e8dff4"></div>
      </div>
      <strong style="font:var(--s-text-sm-strong);color:#8351c2">Info</strong>
      <span class="mono">#8351c2</span>
    </div>
  </div>
</div>
</body></html>
