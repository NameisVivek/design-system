<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px">Spacing / padding / radius scale</div>
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div class="col" style="align-items:center"><div style="width:2px;height:24px;background:#371ee1"></div><span class="mono">xs · 2</span></div>
    <div class="col" style="align-items:center"><div style="width:4px;height:24px;background:#371ee1"></div><span class="mono">s · 4</span></div>
    <div class="col" style="align-items:center"><div style="width:8px;height:24px;background:#371ee1"></div><span class="mono">m · 8</span></div>
    <div class="col" style="align-items:center"><div style="width:12px;height:24px;background:#371ee1"></div><span class="mono">l · 12</span></div>
    <div class="col" style="align-items:center"><div style="width:16px;height:24px;background:#371ee1"></div><span class="mono">xl · 16</span></div>
    <div class="col" style="align-items:center"><div style="width:24px;height:24px;background:#371ee1"></div><span class="mono">xxl · 24</span></div>
  </div>
  <div style="height:1px;background:rgba(56,56,54,0.12);margin:16px 0"></div>
  <div style="display:flex;gap:12px;align-items:flex-end">
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:2px"></div><span class="mono">xs · 2</span></div>
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:4px"></div><span class="mono">s · 4</span></div>
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:8px"></div><span class="mono">m · 8</span></div>
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:12px"></div><span class="mono">l · 12</span></div>
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:16px"></div><span class="mono">xl · 16</span></div>
    <div class="col" style="align-items:center"><div style="width:48px;height:48px;background:#f6f8ff;border:1px solid #a4b6fb;border-radius:24px"></div><span class="mono">xxl · 24</span></div>
  </div>
</div>
</body></html>
