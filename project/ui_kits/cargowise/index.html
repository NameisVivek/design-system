<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CargoWise — Framework</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="supply-icons.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; min-height: 700px; }
  body {
    margin: 0;
    background: var(--s-neutral-canvas-default);
    color: var(--s-neutral-txt-default);
    font: var(--s-text-md-default);
    overflow: hidden;
    min-height: 700px;
  }

  /* ----------------------------------------------------------------------
     App shell — indigo sidebar floats as a card with rounded corners,
     sitting on a neutral canvas background. White content area is flush
     to the right/top/bottom edges with a gutter between it and the sidebar.
     ---------------------------------------------------------------------- */
  .app {
    display: grid;
    grid-template-columns: 216px 1fr;
    gap: 12px;
    padding: 12px 12px 12px 12px;
    height: 100vh;
    min-height: 700px;
    background: var(--s-neutral-canvas-default);
  }

  /* ---- Sidebar — floating rounded indigo card ---- */
  .side {
    color: #fff;
    display: flex; flex-direction: column;
    padding: 12px 0;
    background: var(--s-primary-bg-default);
    border-radius: 8px;
    overflow: hidden;
  }
  .side .logo {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px 18px;
  }
  .side .brand { font: var(--s-title-md-default); color: #fff; letter-spacing: -0.01em; }
  .iconbtn-light {
    width: 24px; height: 24px; border: 0; background: transparent; color: #fff;
    opacity: 0.75; border-radius: 4px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .iconbtn-light:hover { background: rgba(255, 255, 255, 0.12); opacity: 1; }

  .portal {
    margin: 0 12px 14px; padding: 10px 12px;
    background: rgba(255, 255, 255, 0.12); border-radius: 6px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    cursor: pointer;
  }
  .portal:hover { background: rgba(255, 255, 255, 0.18); }
  .portal .lbl { font: var(--s-text-md-strong); color: #fff; line-height: 18px; }
  .portal .sub { font: var(--s-text-sm-default); color: rgba(255, 255, 255, 0.78); line-height: 16px; }

  .slot {
    margin: 4px 14px 0; padding: 24px 0;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: rgba(255, 255, 255, 0.55); font: var(--s-text-sm-default);
  }
  .slot .dots {
    width: 14px; height: 14px;
    background:
      radial-gradient(circle 1.2px at 3px 3px, rgba(255,255,255,0.55) 99%, transparent 100%),
      radial-gradient(circle 1.2px at 11px 3px, rgba(255,255,255,0.55) 99%, transparent 100%),
      radial-gradient(circle 1.2px at 3px 11px, rgba(255,255,255,0.55) 99%, transparent 100%),
      radial-gradient(circle 1.2px at 11px 11px, rgba(255,255,255,0.55) 99%, transparent 100%);
  }
  .side-spacer { flex: 1; }

  .side-bottom { padding: 0 12px 4px; display: flex; flex-direction: column; gap: 2px; }
  .sideitem {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 6px; cursor: pointer;
    color: rgba(255, 255, 255, 0.92);
    font: var(--s-text-md-strong); line-height: 18px;
  }
  .sideitem:hover { background: rgba(255, 255, 255, 0.12); }
  .sideitem .chev { margin-left: auto; opacity: 0.7; }
  .sideitem.user { margin-top: 8px; padding: 10px 12px; }
  .sideitem.user .ava {
    width: 22px; height: 22px; border-radius: 50%;
    background: #c4b8f5; color: #221098;
    font: var(--s-text-xs-strong);
    display: inline-flex; align-items: center; justify-content: center; flex: none;
  }

  /* ---- Main column — edge-to-edge white column, flush with sidebar ---- */
  .main-col {
    display: flex; flex-direction: column; min-width: 0;
    background: var(--s-neutral-canvas-default);
    overflow: hidden;
    position: relative;
  }

  /* ========================================================================
     WtgMasthead (port — desktop variant from WtgMasthead.vue)
     Outer: padding-left: var(--s-padding-xl); bg neutral-canvas.
     .v-toolbar__content row: padding-top: 8px; padding-right: 16px.
     .v-toolbar__extension: flex-direction: column; padding-right: 16px.
     A WtgDivider (1px hairline) is rendered BETWEEN content and extension.
     ======================================================================== */
  .masthead {
    flex: none;
    background: var(--s-neutral-canvas-default);
    padding-left: var(--s-padding-xl);
  }
  /* Top toolbar row (equivalent to .v-toolbar__content) */
  .mh-row {
    min-height: 44px;
    padding-top: 8px;
    padding-right: 16px;
    display: flex; align-items: center; gap: var(--s-spacing-m);
  }
  /* WtgDivider between content and extension (real masthead inserts one) */
  .mh-divider {
    height: 1px;
    background: var(--s-neutral-border-weak-default);
    border: 0;
    margin: 0;
  }
  /* Extension stack — column, padding-right: 16px */
  .mh-extension {
    display: flex;
    flex-direction: column;
    padding-right: 16px;
  }

  /* WtgBreadcrumbs (port) — inline-flex, gap --s-spacing-s.
     Links: underlined, --s-primary-txt-default. Current: weight 600, no underline. */
  .crumbs {
    display: inline-flex;
    align-items: center;
    gap: var(--s-spacing-s);
    font: var(--s-text-md-default);
  }
  .crumbs .bc-item {
    cursor: pointer;
    text-decoration: underline;
    font-weight: var(--s-fontweight-500, 500);
    color: var(--s-primary-txt-default);
  }
  .crumbs .bc-current {
    font-weight: var(--s-fontweight-600, 600);
    color: var(--s-neutral-txt-default);
  }
  .crumbs .bc-sep {
    font-size: var(--s-sizing-icon-sm);
    color: var(--s-neutral-icon-weak-default);
    line-height: 1;
  }
  .mh-row .spacer { flex: 1; }
  .mh-append { display: flex; align-items: center; gap: var(--s-spacing-xs); }

  /* --- WtgButton (port of WtgButton.vue) --- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: var(--s-padding-s) var(--s-padding-m);
    border-radius: var(--s-radius-s); border: 1px solid transparent;
    font: var(--s-text-md-strong); cursor: pointer;
    line-height: 20px; white-space: nowrap; position: relative;
    background: transparent;
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .btn--outline {
    background: var(--s-neutral-bg-default);
    border-color: var(--s-neutral-border-weak-default);
    color: var(--s-neutral-txt-default);
    box-shadow: var(--s-elevation-button-default);
  }
  .btn--outline:hover:not(:active):not(:disabled) {
    background: var(--s-neutral-bg-weak-hover);
    border-color: var(--s-neutral-border-weak-hover);
  }
  .btn--primary {
    background: var(--s-primary-bg-default);
    border-color: var(--s-primary-border-default);
    color: var(--s-primary-txt-inv-default);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
  }
  .btn--primary:hover:not(:disabled) {
    background: var(--s-primary-bg-hover);
    border-color: var(--s-primary-border-hover);
  }
  .btn--ghost {
    background: transparent; border-color: transparent;
    color: var(--s-neutral-txt-default);
  }
  .btn--ghost:hover:not(:disabled)::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: currentColor; opacity: 0.12; pointer-events: none;
  }
  .btn:focus-visible {
    outline: 2px solid var(--s-primary-border-default);
    outline-offset: 1px; z-index: 1;
  }

  /* =====================================================================
     WtgIconButton (port from components/WtgIconButton/WtgIconButton.vue)
     - Extends WtgButton with padding: var(--s-padding-s) + centered icon
     - Icon inside sized via WtgIcon (default md=20, size s=16)
     - Default variant is 'outline' (inherited from WtgButton)
     Default size: 4px padding + 20px icon + 2×1px border = 30px square
     Compact (size s): 2px padding + 16px icon + 2×1px border = 22px square
     ===================================================================== */
  .icon-btn {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    padding: var(--s-padding-s);
    border-radius: var(--s-radius-s);
    border: 1px solid transparent;
    background: transparent;
    color: var(--s-neutral-txt-default);
    cursor: pointer;
    position: relative;
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  /* WtgIcon inside — md (20px) default, s (16px) on small buttons */
  .icon-btn > i {
    font-size: var(--s-sizing-icon-md);
    line-height: 1;
    display: inline-flex;
    align-items: center;
    color: inherit;
  }
  .icon-btn.icon-btn--s { padding: var(--s-padding-xs); }
  .icon-btn.icon-btn--s > i { font-size: var(--s-sizing-icon-sm); }

  /* Outline variant — default style per WtgButton */
  .icon-btn.outline {
    background: var(--s-neutral-bg-default);
    border-color: var(--s-neutral-border-weak-default);
  }
  .icon-btn.outline:hover:not(:active) {
    background: var(--s-neutral-bg-weak-hover);
    border-color: var(--s-neutral-border-weak-hover);
    color: var(--s-neutral-txt-hover);
  }
  .icon-btn.outline:active {
    background: var(--s-neutral-bg-default);
    border-color: var(--s-neutral-border-weak-active);
    color: var(--s-neutral-txt-active);
  }

  /* Ghost variant — transparent, currentColor overlay on hover/active */
  .icon-btn.ghost { background: transparent; border-color: transparent; color: inherit; }
  .icon-btn.ghost:hover::before,
  .icon-btn.ghost:active::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: currentColor; opacity: 0.12; pointer-events: none;
  }
  .icon-btn.ghost:active::before { opacity: 0.24; }

  .icon-btn:focus-visible {
    outline: 2px solid var(--s-primary-border-default);
    outline-offset: 1px;
    z-index: 1;
  }

  /* Extension row 1 — record header (back btn + ID, entity actions) */
  .mh-ext {
    padding: var(--s-padding-m) 0 var(--s-padding-m);
    display: flex; align-items: center; gap: var(--s-padding-m);
  }
  .rec-id-group { display: flex; align-items: center; gap: var(--s-padding-s); }
  .rec-id {
    font: var(--s-title-md-default); color: var(--s-neutral-txt-active);
    padding: 0 var(--s-padding-xs);
  }
  .mh-ext .spacer { flex: 1; }

  /* =========================================================================
     WtgEntityActions (port — WtgEntityActions.vue)
     Flex row, gap: var(--s-spacing-xs), 1px border weak, radius s. NO padding,
     NO fill — just a bordered cluster. Children are ghost WtgButtons.
     ========================================================================= */
  .entity-actions {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: var(--s-spacing-xs);
    border: 1px solid var(--s-neutral-border-weak-default);
    border-radius: var(--s-radius-s);
  }
  .ea-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: var(--s-padding-s) var(--s-padding-s);
    border: 0; background: transparent; border-radius: var(--s-radius-xs);
    font: var(--s-text-md-default); color: var(--s-neutral-txt-default);
    cursor: pointer; white-space: nowrap; line-height: 20px; position: relative;
  }
  .ea-btn:hover::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: currentColor; opacity: 0.08; pointer-events: none;
  }
  .ea-btn svg,
  .ea-btn > i { color: var(--s-neutral-icon-weak-default); font-size: 16px; line-height: 1; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }

  /* =========================================================================
     WtgTabs + WtgTab (port — WtgTabs.vue, WtgTab.vue)
     Tabs strip: flex-grow:1, height: unset. Slider is a 2px bar under the
     active tab (Vuetify slider-color = --s-primary-border-default), spanning
     the full tab width. Tab: padding 0, font --s-text-md-strong, no uppercase.
     .wtg-tab-content inside has padding: var(--s-padding-s) var(--s-padding-s).
     Selected color = --s-primary-txt-default; hover = --s-primary-txt-hover.
     ========================================================================= */
  .mh-tabs {
    display: flex;
    align-items: stretch;
    flex-grow: 1;
    flex-shrink: 0;
    position: relative;
  }
  .mh-tab {
    padding: 0;
    min-width: unset;
    height: min-content;
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--s-neutral-txt-default);
    font: var(--s-text-md-strong);
    letter-spacing: normal;
    text-transform: none;
    position: relative;
  }
  .mh-tab > .mh-tab-content {
    display: inline-flex;
    align-items: center;
    padding: var(--s-padding-s) var(--s-padding-s);
  }
  .mh-tab:hover {
    background: var(--s-primary-bg-weak-hover);
    color: var(--s-primary-txt-hover);
  }
  .mh-tab.active { color: var(--s-primary-txt-default); }
  /* VTabs slider: full-width bar at bottom */
  .mh-tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: var(--s-primary-border-default);
  }

  /* Content area — scrollable body, sits between masthead and action bar footer */
  .content {
    flex: 1;
    overflow: auto;
    padding: var(--s-padding-xl);
    background: var(--s-neutral-canvas-default);
  }

  /* =========================================================================
     WtgActionBar (port — desktop variant from WtgActionBar.vue)
     padding: var(--s-padding-xl); gap: var(--s-spacing-xl);
     justify-content: flex-end; align-items: center.
     border: 1px solid weak, border-radius: var(--s-radius-m, 8px),
     background: var(--s-neutral-bg-default), box-shadow: var(--s-elevation-200).
     Lives inside a footer with some padding from the content edges.
     ========================================================================= */
  .action-bar-footer {
    flex: none;
    padding: 0 var(--s-padding-xl) var(--s-padding-xl);
    background: var(--s-neutral-canvas-default);
  }
  .action-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--s-spacing-xl);
    padding: var(--s-padding-xl);
    border: 1px solid var(--s-neutral-border-weak-default);
    border-radius: var(--s-radius-m, 8px);
    background: var(--s-neutral-bg-default);
    box-shadow: var(--s-elevation-200);
    min-width: 0;
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="side" aria-label="Primary navigation">
      <div class="logo">
        <span class="brand">cargowise</span>
        <button class="iconbtn-light" aria-label="Collapse sidebar" title="Collapse">
          <i class="s-icon-drawer-close"></i>
        </button>
      </div>

      <div class="portal" role="button" tabindex="0">
        <div>
          <div class="lbl">Portal name</div>
          <div class="sub">Branch / Department</div>
        </div>
        <i class="s-icon-caret-right" style="font-size:14px; opacity:0.85"></i>
      </div>

      <div class="slot">
        <div class="dots"></div>
        <div>Slot</div>
      </div>

      <div class="side-spacer"></div>

      <div class="side-bottom">
        <div class="sideitem">
          <i class="s-icon-star-empty"></i>
          <span>Favorites</span>
          <i class="s-icon-caret-right chev" style="font-size:12px"></i>
        </div>
        <div class="sideitem">
          <i class="s-icon-history"></i>
          <span>Recently viewed</span>
          <i class="s-icon-caret-right chev" style="font-size:12px"></i>
        </div>
      </div>

      <div class="side-bottom" style="margin-top:16px">
        <div class="sideitem">
          <i class="s-icon-help"></i>
          <span>Help</span>
        </div>
        <div class="sideitem">
          <i class="s-icon-settings"></i>
          <span>Settings</span>
        </div>
        <div class="sideitem user">
          <span class="ava">DR</span>
          <span>Darlene Robertson</span>
          <i class="s-icon-caret-right chev" style="font-size:12px"></i>
        </div>
      </div>
    </aside>

    <!-- ============ MAIN (floating card) ============ -->
    <main class="main-col">
      <header class="masthead">
        <!-- .v-toolbar__content: breadcrumbs + append (search / warnings) -->
        <div class="mh-row">
          <nav class="crumbs" aria-label="Breadcrumbs">
            <a href="#" class="bc-item">Portal name</a>
            <i class="s-icon-forward-slash bc-sep" aria-hidden="true"></i>
            <span class="bc-current">Form caption</span>
          </nav>
          <div class="spacer"></div>
          <div class="mh-append">
            <button class="icon-btn outline" aria-label="Search">
              <i class="s-icon-search"></i>
            </button>
            <button class="icon-btn outline" aria-label="Warnings">
              <i class="s-icon-status-warning"></i>
            </button>
          </div>
        </div>

        <!-- WtgDivider between content and extension -->
        <hr class="mh-divider" />

        <!-- .v-toolbar__extension: record header + tabs -->
        <div class="mh-extension">
          <!-- Extension row 1: back + ID | entity actions -->
          <div class="mh-ext">
            <div class="rec-id-group">
              <button class="icon-btn ghost" aria-label="Back">
                <i class="s-icon-arrow-left"></i>
              </button>
              <div class="rec-id">GFR-8640</div>
            </div>
            <div class="spacer"></div>
            <div class="entity-actions" role="group" aria-label="Entity actions">
              <button class="ea-btn"><i class="s-icon-workflow"></i>Workflow</button>
              <button class="ea-btn"><i class="s-icon-edocs"></i>eDocs</button>
              <button class="ea-btn"><i class="s-icon-documentation"></i>Documents</button>
              <button class="ea-btn"><i class="s-icon-related-records"></i>Related items</button>
              <button class="ea-btn"><i class="s-icon-notes"></i>Notes</button>
              <button class="ea-btn"><i class="s-icon-chat"></i>Messages</button>
              <button class="ea-btn"><i class="s-icon-logs"></i>Logs</button>
            </div>
          </div>

          <!-- Tabs -->
          <div class="mh-tabs" role="tablist">
            <button class="mh-tab active" role="tab" aria-selected="true"><span class="mh-tab-content">Label</span></button>
            <button class="mh-tab" role="tab"><span class="mh-tab-content">Label</span></button>
            <button class="mh-tab" role="tab"><span class="mh-tab-content">Label</span></button>
            <button class="mh-tab" role="tab"><span class="mh-tab-content">Label</span></button>
            <button class="mh-tab" role="tab"><span class="mh-tab-content">Label</span></button>
          </div>
        </div>
      </header>

      <!-- Content body (intentionally empty – framework shell) -->
      <section class="content"></section>

      <!-- WtgActionBar footer -->
      <footer class="action-bar-footer">
        <div class="action-bar" role="toolbar" aria-label="Form actions">
          <button class="btn btn--outline">Cancel</button>
          <button class="btn btn--outline">Secondary actions</button>
          <button class="btn btn--primary">Save changes</button>
        </div>
      </footer>
    </main>
  </div>

<script>
  document.querySelectorAll('.mh-tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.mh-tab').forEach(x => { x.classList.remove('active'); x.setAttribute('aria-selected','false'); });
    t.classList.add('active'); t.setAttribute('aria-selected','true');
  }));
</script>
</body>
</html>
